<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Happy Birthday 🤍</title>

  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <audio id="background-music" src="./music/monokrom.mp3" preload="auto"></audio>

  <div class="bg" id="content">

    <div class="container" id="timer">
      <h5>Countdown to birthday 🤍</h5>
      <ul>
        <li><span id="hours"></span>Hours</li>
        <li><span id="minutes"></span>Minutes</li>
        <li><span id="seconds"></span>Seconds</li>
      </ul>
    </div>

    <div id="slideSatu" class="animate__animated animate__slideInDown animate__slow d-none">
      <img src="./img/hbd1.png" class="img">
    </div>

    <div id="slideDua" class="slides d-none paper animate__zoomInDown animate__animated animate__delay-2s animate__slow">
      <div class="paper-content">
        <p id="teks1" class="teks"></p>
      </div>
    </div>

    <div id="slideTiga" class="slides d-none paper animate__fadeInRight animate__animated">
      <div class="paper-content">
        <p id="teks2" class="teks"></p>
      </div>
    </div>

    <div class="kotak d-none slides animate__animated animate__fadeInDown animate__delay-2s" id="slideEmpat">
      <div class="row">
        <div class="col-sm mt-1">
          <h5>Kamu suka nggak? 🤍</h5>
        </div>
      </div>

      <div class="row mt-2">
        <div class="col-4 offset-2">
          <button id="gak" class="btn btn-outline-danger">Gak!</button>
        </div>

        <div class="col-4">
          <button id="suka" class="btn btn-outline-info">Suka!!</button>
        </div>
      </div>
    </div>

    <div id="slideLima" class="d-none animate__bounceIn animate__animated animate__slow">
      <i class="fas fa-heart fa-5x text-danger"></i>
    </div>

    <p id="trims" class="text-muted d-none mt-2"></p>

    <p id="tap" class="d-none animate__animated animate__pulse text-muted animate__slow animate__infinite">
      Ketuk untuk melanjutkan
    </p>

  </div>

  <div id="slideEnam" class="d-none">

    <div id="gallery" class="stack-gallery">

      <div class="polaroid"><img src="./img/foto1.jpeg"></div>
      <div class="polaroid"><img src="./img/foto2.jpeg"></div>
      <div class="polaroid"><img src="./img/foto3.jpeg"></div>
      <div class="polaroid"><img src="./img/foto4.jpeg"></div>
      <div class="polaroid"><img src="./img/foto5.jpeg"></div>
      <div class="polaroid"><img src="./img/foto6.jpeg"></div>
      <div class="polaroid"><img src="./img/foto7.jpeg"></div>
      <div class="polaroid"><img src="./img/foto8.jpeg"></div>
      <div class="polaroid"><img src="./img/foto9.jpeg"></div>
      <div class="polaroid"><img src="./img/foto10.jpeg"></div>

      <div class="polaroid"><img src="./img/foto11.jpeg"></div>
      <div class="polaroid"><img src="./img/foto12.jpeg"></div>
      <div class="polaroid"><img src="./img/foto13.jpeg"></div>
      <div class="polaroid"><img src="./img/foto14.jpeg"></div>
      <div class="polaroid"><img src="./img/foto15.jpeg"></div>
      <div class="polaroid"><img src="./img/foto16.jpeg"></div>
      <div class="polaroid"><img src="./img/foto17.jpeg"></div>
      <div class="polaroid"><img src="./img/foto18.jpeg"></div>
      <div class="polaroid"><img src="./img/foto19.jpeg"></div>
      <div class="polaroid"><img src="./img/foto20.jpeg"></div>

      <div class="polaroid"><img src="./img/foto21.jpeg"></div>
      <div class="polaroid"><img src="./img/foto22.jpeg"></div>
      <div class="polaroid"><img src="./img/foto23.jpeg"></div>
      <div class="polaroid"><img src="./img/foto24.jpeg"></div>
      <div class="polaroid"><img src="./img/foto25.jpeg"></div>
      <div class="polaroid"><img src="./img/foto26.jpeg"></div>
      <div class="polaroid"><img src="./img/foto27.jpeg"></div>
      <div class="polaroid"><img src="./img/foto28.jpeg"></div>
      <div class="polaroid"><img src="./img/foto29.jpeg"></div>
      <div class="polaroid"><img src="./img/foto30.jpeg"></div>

      <div class="polaroid"><img src="./img/foto31.jpeg"></div>
      <div class="polaroid"><img src="./img/foto32.jpeg"></div>
      <div class="polaroid"><img src="./img/foto33.jpeg"></div>
      <div class="polaroid"><img src="./img/foto34.jpeg"></div>
      <div class="polaroid"><img src="./img/foto35.jpeg"></div>
      <div class="polaroid"><img src="./img/foto36.jpeg"></div>

    </div>

    <button id="showEndingBtn" class="ending-btn d-none">
      Klik untuk pesan terakhir 🤍
    </button>

  </div>

  <div id="endingText" class="ending-text d-none">
    <h1>Thank You For Being Born 🤍</h1>
    <p>and thank you for being part of my life.</p>
  </div>

  <div id="lightbox" class="lightbox">
    <span id="closeLightbox">&times;</span>
    <img id="lightboxImg">
  </div>

  <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"></script>
  <script src="https://kit.fontawesome.com/61e5120832.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/typeit@7.0.4/dist/typeit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="script.js"></script>

</body>
</html>\
